# ══════════════════════════════════════════════════════════════
# TEST CONFIGURATION
# File: src/test/resources/application.properties
#
# This overrides the main application.properties ONLY during tests.
# Tests use H2 (in-memory DB) — no MySQL needed to run tests.
#
# WHY H2 FOR TESTS?
#   - No external database dependency
#   - Tests run fast (in-memory, no disk I/O)
#   - Each test run starts with a clean DB (create-drop)
#   - CI/CD pipelines don't need MySQL installed
# ══════════════════════════════════════════════════════════════

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — create-drop: creates schema before tests, drops after
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 console (useful for debugging test DB)
spring.h2.console.enabled=true

# Disable Thymeleaf cache
spring.thymeleaf.cache=false

# Suppress noisy logs during tests
logging.level.com.hospital=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
