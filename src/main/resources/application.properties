# ══════════════════════════════════════════════════════════════
# APPLICATION CONFIGURATION
# File: src/main/resources/application.properties
#
# Spring Boot reads this file at startup to configure:
#   - Database connection (MySQL)
#   - JPA/Hibernate behavior
#   - Thymeleaf template engine
#   - Logging levels
#   - Server port
#
# INTERVIEW TIP: "application.properties is the central config file.
# In production we'd use application-prod.properties (Spring Profiles)
# to separate dev and prod configurations."
# ══════════════════════════════════════════════════════════════

# ── SERVER ──────────────────────────────────────────────────
server.port=8080

# ── APPLICATION NAME ─────────────────────────────────────────
spring.application.name=hospital-management

# ── MYSQL DATABASE CONNECTION ────────────────────────────────
# Replace 'root' and 'yourpassword' with your MySQL credentials
# Create the DB first: CREATE DATABASE hospital_db;
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / HIBERNATE ──────────────────────────────────────────
# hibernate.ddl-auto options:
#   create       → drops & recreates tables every restart (dev only)
#   update       → alters tables to match entities (safe for dev)
#   validate     → validates schema matches entities, no changes
#   none         → do nothing (use in production with Flyway/Liquibase)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (set to false in production)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect — tells Hibernate which SQL syntax to generate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── THYMELEAF ────────────────────────────────────────────────
# Cache = false during development (see changes without restart)
# Set to true in production for performance
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── LOGGING ──────────────────────────────────────────────────
# JD REQUIREMENT: "implement Logging in web application"
# Log levels: TRACE < DEBUG < INFO < WARN < ERROR
# In production: set to WARN or ERROR to reduce noise

# Our application logs at DEBUG level (shows all our log.info/debug calls)
logging.level.com.hospital=DEBUG

# Hibernate SQL logs at DEBUG (shows generated queries)
logging.level.org.hibernate.SQL=DEBUG

# Show query parameter values (useful for debugging)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Spring MVC request mapping logs
logging.level.org.springframework.web=INFO

# Log file output (optional — also logs to console by default)
logging.file.name=logs/hospital-app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── FILE UPLOAD (for future profile photo feature) ───────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
