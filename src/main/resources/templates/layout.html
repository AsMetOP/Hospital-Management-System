<!DOCTYPE html>
<!--
    BASE LAYOUT TEMPLATE
    File: src/main/resources/templates/layout.html

    WHAT IS THIS?
    Thymeleaf Layout — a master template that all pages "extend".
    Instead of repeating <head>, navbar, footer in every page,
    we define them once here. Child pages fill in only the
    unique content via th:fragment and th:replace.

    HOW THYMELEAF FRAGMENTS WORK:
      In this file:  th:fragment="content"  → defines a slot
      In child page: th:replace="~{layout :: content}" → fills that slot

    BOOTSTRAP 5:
    Loaded via CDN — no download needed.
    JD REQUIREMENT: "basic Bootstrap components"
    We use: navbar, cards, table, badges, buttons, modal, alerts, grid
-->
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title — child pages pass their own title -->
    <title th:replace="${title}">Hospital Management System</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- ══════════════════════════════════════════════════
     NAVIGATION BAR (Bootstrap Navbar Component)
     JD REQUIREMENT: "basic Bootstrap components"
     ══════════════════════════════════════════════════ -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-4">

        <!-- Brand / Logo -->
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-hospital me-2"></i>MediCare HMS
        </a>

        <!-- Mobile toggle button -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Nav links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}"
                       th:classappend="${#httpServletRequest.requestURI == '/dashboard' or #httpServletRequest.requestURI == '/'} ? 'active'">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/patients}"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/patients')} ? 'active'">
                        <i class="bi bi-people me-1"></i>Patients
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/doctors}"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/doctors')} ? 'active'">
                        <i class="bi bi-person-badge me-1"></i>Doctors
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/appointments}"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/appointments')} ? 'active'">
                        <i class="bi bi-calendar-check me-1"></i>Appointments
                    </a>
                </li>

            </ul>

            <!-- Right side -->
            <ul class="navbar-nav">
                <li class="nav-item">
                    <span class="navbar-text text-white-50 small">
                        <i class="bi bi-circle-fill text-success me-1" style="font-size:8px"></i>System Online
                    </span>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ══════════════════════════════════════════════════
     FLASH MESSAGE ALERTS
     These come from RedirectAttributes in the controller.
     th:if — only renders if the attribute exists in the Model.
     ══════════════════════════════════════════════════ -->
<div class="container-fluid px-4 mt-3" th:if="${successMessage or errorMessage}">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ══════════════════════════════════════════════════
     MAIN CONTENT SLOT
     Child pages inject their content here via:
     th:replace="~{layout :: content}"
     ══════════════════════════════════════════════════ -->
<main class="container-fluid px-4 py-4">
    <th:block th:replace="${content}">
        <!-- Child page content goes here -->
    </th:block>
</main>

<!-- FOOTER -->
<footer class="bg-light border-top py-3 mt-auto">
    <div class="container-fluid px-4 text-center text-muted small">
        <i class="bi bi-hospital me-1"></i>
        MediCare Hospital Management System &copy; 2024 &mdash;
        Built with Spring Boot + MySQL + Bootstrap
    </div>
</footer>

<!-- Bootstrap 5 JS Bundle (includes Popper.js) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Chart.js for dashboard charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<!-- Custom JS -->
<script th:src="@{/js/app.js}"></script>

</body>
</html>
