<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main-content})}">
<head><title>Doctors | MediCare HMS</title></head>
<body>
<th:block th:fragment="main-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-person-badge text-primary me-2"></i>Doctor Management</h4>
        <a th:href="@{/doctors/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-2"></i>Add Doctor
        </a>
    </div>

    <!-- Search -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <form th:action="@{/doctors}" method="get" class="d-flex gap-2">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" name="search" class="form-control border-start-0"
                           placeholder="Search by specialization..." th:value="${search}">
                    <button class="btn btn-primary" type="submit">Search</button>
                    <a th:href="@{/doctors}" class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Doctors Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">#</th>
                            <th>Doctor</th>
                            <th>Email</th>
                            <th>Specialization</th>
                            <th>Experience</th>
                            <th>Status</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="doctor, stat : ${doctors}">
                            <td class="ps-3 text-muted small" th:text="${stat.count}">1</td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="avatar-circle bg-success bg-opacity-10 text-success fw-bold"
                                         th:text="${#strings.substring(doctor.firstName,0,1) + #strings.substring(doctor.lastName,0,1)}">AB</div>
                                    <div>
                                        <div class="fw-medium" th:text="${doctor.fullName}">Dr. Name</div>
                                        <div class="text-muted small" th:text="${doctor.qualification}">MBBS</div>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${doctor.email}">email</td>
                            <td><span class="badge bg-primary bg-opacity-10 text-primary" th:text="${doctor.specialization}">Cardiology</span></td>
                            <td th:text="${doctor.experience} + ' yrs'">5 yrs</td>
                            <td>
                                <span th:if="${doctor.available}" class="badge bg-success">Available</span>
                                <span th:unless="${doctor.available}" class="badge bg-secondary">Unavailable</span>
                            </td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-1">
                                    <a th:href="@{/doctors/{id}/edit(id=${doctor.id})}" class="btn btn-sm btn-outline-primary" title="Edit">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <button type="button" class="btn btn-sm btn-outline-danger"
                                            th:attr="data-id=${doctor.id}, data-name=${doctor.fullName}"
                                            onclick="confirmDeleteDoctor(this)">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(doctors)}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="bi bi-person-x fs-1 d-block mb-2"></i>No doctors found.
                                <div class="mt-3">
                                    <a th:href="@{/doctors/new}" class="btn btn-primary btn-sm">Add First Doctor</a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold text-danger"><i class="bi bi-exclamation-triangle me-2"></i>Confirm Delete</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">Delete doctor <strong id="doctorName"></strong>? All their appointments will also be removed.</div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <form id="deleteForm" method="post">
                        <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Delete</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        function confirmDeleteDoctor(btn) {
            document.getElementById('doctorName').textContent = btn.getAttribute('data-name');
            document.getElementById('deleteForm').action = '/doctors/' + btn.getAttribute('data-id') + '/delete';
            new bootstrap.Modal(document.getElementById('deleteModal')).show();
        }
    </script>

</th:block>
</body>
</html>
