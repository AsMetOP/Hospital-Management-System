<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main-content})}">
<head>
    <title th:text="${patient.fullName + ' | MediCare HMS'}">Patient Details</title>
</head>
<body>
<th:block th:fragment="main-content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/dashboard}">Dashboard</a></li>
            <li class="breadcrumb-item"><a th:href="@{/patients}">Patients</a></li>
            <li class="breadcrumb-item active" th:text="${patient.fullName}">Patient Name</li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- Patient Info Card -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm text-center p-4">
                <div class="avatar-lg mx-auto mb-3 bg-primary bg-opacity-10 text-primary rounded-circle d-flex align-items-center justify-content-center fw-bold fs-3"
                     style="width:80px;height:80px;"
                     th:text="${#strings.substring(patient.firstName,0,1) + #strings.substring(patient.lastName,0,1)}">AB</div>
                <h5 class="fw-bold mb-1" th:text="${patient.fullName}">Full Name</h5>
                <span class="badge bg-primary bg-opacity-10 text-primary mb-3"
                      th:text="'Patient ID: #' + ${patient.id}">ID</span>

                <div class="d-flex justify-content-center gap-2">
                    <a th:href="@{/patients/{id}/edit(id=${patient.id})}" class="btn btn-primary btn-sm">
                        <i class="bi bi-pencil me-1"></i>Edit
                    </a>
                    <a th:href="@{/patients}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>Back
                    </a>
                </div>
            </div>
        </div>

        <!-- Patient Details -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white py-3">
                    <h6 class="fw-semibold mb-0"><i class="bi bi-info-circle text-primary me-2"></i>Patient Details</h6>
                </div>
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="text-muted small fw-medium text-uppercase">Email</label>
                            <p class="mb-0" th:text="${patient.email}">email</p>
                        </div>
                        <div class="col-sm-6">
                            <label class="text-muted small fw-medium text-uppercase">Phone</label>
                            <p class="mb-0" th:text="${patient.phone}">phone</p>
                        </div>
                        <div class="col-sm-6">
                            <label class="text-muted small fw-medium text-uppercase">Date of Birth</label>
                            <p class="mb-0" th:text="${patient.dateOfBirth != null} ? ${#temporals.format(patient.dateOfBirth, 'dd MMM yyyy')} : 'Not provided'">DOB</p>
                        </div>
                        <div class="col-sm-6">
                            <label class="text-muted small fw-medium text-uppercase">Gender</label>
                            <p class="mb-0" th:text="${patient.gender ?: 'Not specified'}">Gender</p>
                        </div>
                        <div class="col-sm-6">
                            <label class="text-muted small fw-medium text-uppercase">Blood Group</label>
                            <p class="mb-0">
                                <span class="badge bg-danger bg-opacity-10 text-danger"
                                      th:text="${patient.bloodGroup ?: 'Unknown'}">O+</span>
                            </p>
                        </div>
                        <div class="col-sm-6">
                            <label class="text-muted small fw-medium text-uppercase">Registered On</label>
                            <p class="mb-0" th:text="${patient.createdAt != null} ? ${#temporals.format(patient.createdAt,'dd MMM yyyy')} : '-'">Date</p>
                        </div>
                        <div class="col-12">
                            <label class="text-muted small fw-medium text-uppercase">Address</label>
                            <p class="mb-0" th:text="${patient.address ?: 'No address provided'}">Address</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
